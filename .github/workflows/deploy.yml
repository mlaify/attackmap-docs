name: Deploy docs

# Builds the MkDocs Material site and publishes it to the gh-pages branch, which
# GitHub Pages serves at docs.matthewd.xyz (the CNAME file pins the domain).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: mkdocs gh-deploy --force --no-history
